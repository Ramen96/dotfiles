################
### MONITORS ###
################
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor= DP-6, 3840x2160@160, 0x0, 1.25


##############
### CURSOR ###
##############

exec-once = hyprctl setcursor Bibata-Modern-Classic 24

xwayland {
  force_zero_scaling = true
}

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = nautilus
$browser = brave
$menu = wofi --show drun

#################
### AUTOSTART ###
#################

exec-once = waybar & hyprpaper & hypridle & nm-applet --indicator &
exec-once = swaync &
exec-once = dbus-update-activation-environment DISPLAY XAUTHORITY WAYLAND_DISPLAY
exec-once = dbus-update-activation-environment --all
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # for XDPH
exec-once = dbus-update-activation-environment --systemd --all # for XDPH
exec-once = systemctl --user start hyprpolkitagent

# This ensures Qt apps look for the Kvantum engine
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum

#############################
### ENVIRONMENT VARIABLES ###
#############################

source = ~/.config/hypr/hyprConf/env.conf

###################################################
### Environment for xdg-desktop-portal-hyprland ###
###################################################
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

##############
### NVIDIA ###
##############

source = ~/.config/hypr/hyprConf/nvidia.conf


#####################
### LOOK AND FEEL ###
#####################

source = ~/.config/hypr/hyprConf/look-and-feel.conf

#############
### INPUT ###
#############

source = ~/.config/hypr/hyprConf/input.conf

###################
### KEYBINDINGS ###
###################

source = ~/.config/hypr/hyprConf/keyBindings.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

source = ~/.config/hypr/hyprConf/window-and-workspace.conf
