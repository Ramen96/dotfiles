# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule = suppress_event maximize, match:class .* # You'll probably like this.
windowrule = opacity 0.88 0.88, match:class discord
windowrule = opacity 0.90 0.90, match:class steam
windowrule = opacity 0.8 0.8, match:class swaync
windowrule = opacity 0.90 0.90, match:class com.mitchellh.ghostty
windowrule = opacity 0.6 0.6, match:class timeshift-gtk
windowrule = match:class ^(gamescope)$, immediate yes

